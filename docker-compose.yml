version: '3.8'

services:
  buffalo:
    build:
      context: .
      dockerfile: Dockerfile
    image: buffalo:latest
    container_name: buffalo
    volumes:
      # Mount your project directory
      - ./test-project:/workspace
      # Cache for dependencies
      - buffalo-cache:/root/.cache
    working_dir: /workspace
    command: build
    environment:
      - BUFFALO_LOG_LEVEL=info

  # Development service with live reload
  buffalo-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: buffalo:latest
    container_name: buffalo-dev
    volumes:
      - .:/workspace
      - buffalo-cache:/root/.cache
      - buffalo-go-cache:/go/pkg/mod
    working_dir: /workspace
    command: ["sh", "-c", "while true; do sleep 1000; done"]
    environment:
      - BUFFALO_LOG_LEVEL=debug

volumes:
  buffalo-cache:
  buffalo-go-cache:
