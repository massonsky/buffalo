# Buffalo Build Pipeline for GitLab CI
# This configuration builds protobuf files using Buffalo

variables:
  BUFFALO_VERSION: "0.7.0"
  PROTOC_VERSION: "25.1"
  GO_VERSION: "1.21"
  PYTHON_VERSION: "3.11"

# Define pipeline stages
stages:
  - setup
  - validate
  - build
  - test
  - deploy

# Cache dependencies for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .buffalo/
    - generated/

# Setup job - install Buffalo and dependencies
setup:buffalo:
  stage: setup
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - apt-get install -y curl unzip
  script:
    - echo "Installing Buffalo ${BUFFALO_VERSION}..."
    - curl -L -o buffalo https://github.com/massonsky/buffalo/releases/download/v${BUFFALO_VERSION}/buffalo-linux-amd64
    - chmod +x buffalo
    - mv buffalo /usr/local/bin/
    - buffalo version
  artifacts:
    paths:
      - /usr/local/bin/buffalo
    expire_in: 1 day

# Doctor check - validate environment
doctor:check:
  stage: validate
  image: ubuntu:22.04
  dependencies:
    - setup:buffalo
  before_script:
    - apt-get update -qq
    - apt-get install -y protobuf-compiler golang-go python3 python3-pip
    - pip3 install grpcio-tools
    - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
    - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
    - export PATH=$PATH:$(go env GOPATH)/bin
  script:
    - buffalo doctor
  allow_failure: true

# Build proto files
build:proto:
  stage: build
  image: ubuntu:22.04
  dependencies:
    - setup:buffalo
  before_script:
    - apt-get update -qq
    - apt-get install -y protobuf-compiler golang-go python3 python3-pip
    - pip3 install grpcio-tools
    - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
    - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
    - export PATH=$PATH:$(go env GOPATH)/bin
  script:
    - echo "Building proto files..."
    - buffalo build
    - echo "Build complete!"
  artifacts:
    paths:
      - generated/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Lint proto files
lint:proto:
  stage: validate
  image: ubuntu:22.04
  dependencies:
    - setup:buffalo
  before_script:
    - apt-get update -qq
    - apt-get install -y protobuf-compiler
  script:
    - buffalo lint
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Format check
format:check:
  stage: validate
  image: ubuntu:22.04
  dependencies:
    - setup:buffalo
  before_script:
    - apt-get update -qq
    - apt-get install -y protobuf-compiler
  script:
    - buffalo format --check
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Test generated Go code
test:go:
  stage: test
  image: golang:${GO_VERSION}
  dependencies:
    - build:proto
  script:
    - cd generated/go || exit 0
    - go mod init generated || true
    - go mod tidy || true
    - go build ./... || true
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Test generated Python code
test:python:
  stage: test
  image: python:${PYTHON_VERSION}
  dependencies:
    - build:proto
  script:
    - cd generated/python || exit 0
    - python -m py_compile **/*.py || true
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Deploy artifacts
deploy:artifacts:
  stage: deploy
  dependencies:
    - build:proto
  script:
    - echo "Deploying generated files..."
    - tar -czf generated-${CI_COMMIT_TAG}.tar.gz generated/
  artifacts:
    name: "generated-${CI_COMMIT_TAG}"
    paths:
      - generated-${CI_COMMIT_TAG}.tar.gz
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG

# Dry run job for testing
dryrun:build:
  stage: validate
  image: ubuntu:22.04
  dependencies:
    - setup:buffalo
  before_script:
    - apt-get update -qq
    - apt-get install -y protobuf-compiler golang-go python3 python3-pip
    - pip3 install grpcio-tools
    - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
    - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
    - export PATH=$PATH:$(go env GOPATH)/bin
  script:
    - echo "Running dry-run build..."
    - buffalo build --dry-run
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
