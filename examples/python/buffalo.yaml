version: "1.0"

# Project settings
project:
  name: "python-example"
  description: "Python gRPC example using Buffalo"

# Proto file paths
proto:
  paths:
    - "./protos"

# Output settings
output:
  base_dir: "./generated"
  per_language:
    python: "./generated/python"

# Language settings
languages:
  python:
    enabled: true
    options:
      grpc: true
      typing: false

  go:
    enabled: false
  
  rust:
    enabled: false
  
  cpp:
    enabled: false

# Build settings
build:
  workers: 4
  incremental: true
  cache:
    enabled: true
    directory: "./.buffalo-cache"

# Logging
logging:
  level: "info"
  format: "text"
