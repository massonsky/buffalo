# Example Buffalo Configuration
# This is a sample configuration file for Buffalo v0.0.0

version: 1.0

# Global settings
global:
  # Paths to proto files (supports glob patterns)
  proto_path:
    - ./proto
    - ./api
  
  # Output directory for generated code
  output_path: ./generated
  
  # Additional import paths
  import_paths:
    - ./third_party/proto
    - ./vendor/proto
  
  # Number of parallel compilation jobs (0 = auto-detect CPU count)
  parallel: 0
  
  # Enable incremental build (only recompile changed files)
  incremental: true
  
  # Temporary directory for build artifacts
  temp_dir: ./.buffalo/temp

# Language-specific configurations
languages:
  # Python configuration
  python:
    enabled: false
    output: ./generated/python
    plugins:
      - grpc
    options:
      mypy_stubs: true
      grpc_python_out: ./generated/python
  
  # Go configuration
  go:
    enabled: false
    output: ./generated/go
    go_package_prefix: github.com/yourorg/project
    plugins:
      - grpc
    options:
      go_opt: paths=source_relative
      go-grpc_opt: paths=source_relative
  
  # Rust configuration
  rust:
    enabled: false
    output: ./generated/rust
    plugins:
      - tonic
    options:
      build_server: true
      build_client: true
  
  # C++ configuration
  cpp:
    enabled: false
    output: ./generated/cpp
    plugins:
      - grpc
    options:
      std: c++17
      grpc_out: ./generated/cpp

# Logging configuration
logging:
  # Log level: debug, info, warn, error, fatal
  level: info
  
  # Output format: text, json, colored
  format: colored
  
  # Output destination: stdout, stderr, or file path
  output: stdout
  
  # Enable timestamps in logs
  timestamps: true

# Cache configuration
cache:
  # Enable caching
  enabled: true
  
  # Cache directory
  dir: ./.buffalo/cache
  
  # Cache TTL in hours (0 = no expiration)
  ttl: 24

# Plugin configuration
plugins: []
  # Example plugin configuration:
  # - name: buffalo-lint
  #   enabled: true
  #   options:
  #     strict: true
