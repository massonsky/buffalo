# yaml-language-server: $schema=https://raw.githubusercontent.com/massonsky/buffalo/main/schemas/buffalo.schema.json
# Buffalo configuration. Run `buffalo config validate` to check this file.
# Profile: full. Generated by `buffalo config init --profile=full`.

bazel:
    auto_detect: false
    bazel_path: ""
    enabled: false
    generate_build_files: false
    go_module_path: ""
    patterns: null
    strip_import_prefix: ""
    use_query: false
build:
    cache:
        directory: .buffalo/cache
        enabled: true
    incremental: true
    workers: 0
dependencies: null
languages:
    cpp:
        enabled: true
        models_output: ""
        namespace: myproject
        orm: false
        orm_plugin: ""
    go:
        enabled: true
        generator: protoc-gen-go
        models_output: ""
        module: github.com/yourorg/yourproject
        orm: false
        orm_plugin: ""
    python:
        enabled: true
        exclude_imports: null
        generator: grpcio-tools
        models_output: ""
        orm: false
        orm_plugin: ""
        package: proto_gen
        pb2_import_prefix: ""
        workdir: ""
    rust:
        enabled: true
        generator: prost
        models_output: ""
        orm: false
        orm_plugin: ""
    typescript:
        enabled: true
        generator: ts-proto
        models_output: ""
        options:
            es_modules: null
            generate_grpc: null
            generate_grpc_web: null
            generate_nice_grpc: null
            generator: ""
            output_index: null
            protoc_gen_ts_path: ""
            ts_proto_path: ""
        orm: false
        orm_plugin: ""
        output: ""
        plugins: null
logging:
    file: ""
    format: text
    level: info
    output: stdout
models:
    base_model_fields: null
    enabled: false
    generate_models_from_proto: false
output:
    base_dir: ./generated
    directories:
        cpp: cpp
        go: go
        python: python
        rust: rust
        typescript: typescript
    preserve_proto_structure: true
plugins: null
project:
    name: my-proto-project
    version: 0.1.0
proto:
    exclude:
        - '**/*_test.proto'
    import_paths:
        - ./third_party
    paths:
        - ./protos
schema_version: 2
templates: null
versioning:
    enabled: false
    keep_versions: 0
    output_format: directory
    strategy: hash
