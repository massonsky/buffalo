run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - gocyclo
    - gocognit
    - goconst
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - nolintlint
  
  disable:
    - exhaustive

linters-settings:
  gocyclo:
    min-complexity: 20
  
  gocognit:
    min-complexity: 40
  
  goconst:
    min-len: 3
    min-occurrences: 8
  
  gosec:
    excludes:
      - G110
      - G204
      - G401
      - G501
      - G505

  misspell:
    locale: US
  
  nakedret:
    max-func-lines: 30
  
  prealloc:
    simple: true
    range-loops: true
    for-loops: false

issues:
  exclude-rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - gocyclo
        - gocognit
        - errcheck
        - gosec
    
    # Exclude test helper functions
    - path: tests/
      linters:
        - gocyclo
        - errcheck

    # CLI commands have high complexity by nature
    - path: internal/cli/
      linters:
        - gocognit
        - gocyclo
        - goconst

    # Complex parsers and analyzers
    - path: internal/(lsp|builder|permissions|models|upgrade|bazel|workspace|validation|system)/
      linters:
        - gocognit
        - gocyclo
        - goconst
  
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  print-issued-lines: true
  print-linter-name: true
