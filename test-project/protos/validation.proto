syntax = "proto3";

package ecommerce.validation;

option go_package = "github.com/yourorg/models-test/gen/validation";

import "buffalo/validate/validate.proto";

// ============================================================================
// RegisterRequest — валидация пользовательского ввода
// ============================================================================
message RegisterRequest {
  string username = 1 [(buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 50,
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  string email = 2 [(buffalo.validate.rules).string = {
    email: true,
    max_len: 255
  }];

  string password = 3 [(buffalo.validate.rules).string = {
    min_len: 8,
    max_len: 128
  }];

  int32 age = 4 [(buffalo.validate.rules).int32 = {
    gte: 13,
    lte: 150
  }];
}

// ============================================================================
// PaymentRequest — валидация платежа
// ============================================================================
message PaymentRequest {
  string order_id = 1 [(buffalo.validate.rules).string = { uuid: true }];

  double amount = 2 [(buffalo.validate.rules).double = {
    gt: 0.0
  }];

  string currency = 3 [(buffalo.validate.rules).string = {
    in: ["USD", "EUR", "GBP", "RUB"]
  }];

  string card_number = 4 [(buffalo.validate.rules).string = {
    len: 16,
    pattern: "^[0-9]+$"
  }];
}

// ============================================================================
// SearchRequest — валидация поиска
// ============================================================================
message SearchRequest {
  string query = 1 [(buffalo.validate.rules).string = {
    min_len: 1,
    max_len: 500
  }];

  int32 page_size = 2 [(buffalo.validate.rules).int32 = {
    gte: 1,
    lte: 100
  }];

  int32 page = 3 [(buffalo.validate.rules).int32 = {
    gte: 1
  }];

  repeated string categories = 4 [(buffalo.validate.rules).repeated = {
    max_items: 10,
    unique: true
  }];
}
