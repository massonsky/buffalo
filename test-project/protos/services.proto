syntax = "proto3";

package ecommerce.permissions;

option go_package = "github.com/yourorg/models-test/gen/permissions";

import "buffalo/permissions/permissions.proto";

// ============================================================================
// ProductService с RBAC
// ============================================================================
service ProductService {
  option (buffalo.permissions.resource) = "products";

  rpc GetProduct(GetProductRequest) returns (ProductResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "read"
      roles: ["admin", "user", "viewer"]
    };
  }

  rpc CreateProduct(CreateProductRequest) returns (ProductResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "create"
      roles: ["admin", "product_manager"]
    };
  }

  rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "update"
      roles: ["admin", "product_manager"]
      audit_log: true
    };
  }

  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "delete"
      roles: ["admin"]
      audit_log: true
    };
  }
}

// ============================================================================
// OrderService с RBAC + owner_field
// ============================================================================
service OrderService {
  option (buffalo.permissions.resource) = "orders";

  rpc GetOrder(GetOrderRequest) returns (OrderResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "read"
      roles: ["admin", "user"]
      owner_field: "user_id"
    };
  }

  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "create"
      roles: ["admin", "user"]
    };
  }

  rpc CancelOrder(CancelOrderRequest) returns (OrderResponse) {
    option (buffalo.permissions.method_perms) = {
      action: "cancel"
      roles: ["admin", "user"]
      owner_field: "user_id"
    };
  }
}

// Messages
message GetProductRequest { string id = 1; }
message CreateProductRequest {
  string name = 1;
  double price = 2;
  int32 stock = 3;
}
message UpdateProductRequest {
  string id = 1;
  string name = 2;
  double price = 3;
}
message DeleteProductRequest { string id = 1; }
message DeleteProductResponse { bool success = 1; }
message ProductResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
}
message GetOrderRequest { string id = 1; }
message CreateOrderRequest {
  string user_id = 1;
  repeated string product_ids = 2;
}
message CancelOrderRequest {
  string id = 1;
  string user_id = 2;
}
message OrderResponse {
  string id = 1;
  string user_id = 2;
  string status = 3;
  double total = 4;
}
