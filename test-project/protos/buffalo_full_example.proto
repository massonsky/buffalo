syntax = "proto3";

package buffalo.test.full;

option go_package = "github.com/massonsky/buffalo/test-project/gen/full";

// Import both Buffalo extensions
import "buffalo/validate/validate.proto";
import "buffalo/permissions/permissions.proto";

// ============================================================================
// E-Commerce API with full Buffalo features
// ============================================================================

// Product Service with validation and permissions
service ProductService {
  option (buffalo.permissions.resource) = "products";

  // Public product listing
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (buffalo.permissions.public) = true;
    option (buffalo.permissions.rate_limit) = {
      requests_per_minute: 100
    };
  }

  // Get product details
  rpc GetProduct(GetProductRequest) returns (Product) {
    option (buffalo.permissions.public) = true;
  }

  // Create product - seller/admin only
  rpc CreateProduct(CreateProductRequest) returns (Product) {
    option (buffalo.permissions.action) = "create";
    option (buffalo.permissions.roles) = ["seller", "admin"];
  }

  // Update product - owner or admin
  rpc UpdateProduct(UpdateProductRequest) returns (Product) {
    option (buffalo.permissions.action) = "update";
    option (buffalo.permissions.roles) = ["seller", "admin"];
    option (buffalo.permissions.owner_field) = "seller_id";
  }

  // Delete product - admin only
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse) {
    option (buffalo.permissions.action) = "delete";
    option (buffalo.permissions.roles) = ["admin"];
    option (buffalo.permissions.audit) = true;
  }
}

// Order Service with strict validation
service OrderService {
  option (buffalo.permissions.resource) = "orders";

  // Create order - authenticated users
  rpc CreateOrder(CreateOrderRequest) returns (Order) {
    option (buffalo.permissions.action) = "create";
    option (buffalo.permissions.roles) = ["user", "admin"];
    option (buffalo.permissions.rate_limit) = {
      requests_per_minute: 10
    };
  }

  // Get order - owner or admin
  rpc GetOrder(GetOrderRequest) returns (Order) {
    option (buffalo.permissions.action) = "read";
    option (buffalo.permissions.roles) = ["user", "admin"];
    option (buffalo.permissions.owner_field) = "customer_id";
  }

  // Cancel order - owner within time limit
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (buffalo.permissions.action) = "cancel";
    option (buffalo.permissions.roles) = ["user", "admin"];
    option (buffalo.permissions.owner_field) = "customer_id";
    option (buffalo.permissions.condition) = "order.status == 'pending'";
  }

  // Refund order - admin with audit
  rpc RefundOrder(RefundOrderRequest) returns (RefundOrderResponse) {
    option (buffalo.permissions.action) = "refund";
    option (buffalo.permissions.roles) = ["admin", "support"];
    option (buffalo.permissions.audit) = true;
    option (buffalo.permissions.require_approval) = true;
  }
}

// ============================================================================
// Request/Response Messages with Validation
// ============================================================================

message ListProductsRequest {
  // Pagination
  int32 page_size = 1 [(buffalo.validate.rules).int32 = {
    gte: 1,
    lte: 100
  }];
  
  string page_token = 2 [(buffalo.validate.rules).string = {
    max_len: 500
  }];

  // Filters
  string category = 3 [(buffalo.validate.rules).string = {
    max_len: 100
  }];

  double min_price = 4 [(buffalo.validate.rules).double = {
    gte: 0.0
  }];

  double max_price = 5 [(buffalo.validate.rules).double = {
    gte: 0.0
  }];

  // Sort
  string sort_by = 6 [(buffalo.validate.rules).string = {
    in: ["price", "name", "created_at", "rating"]
  }];

  SortOrder sort_order = 7;
}

enum SortOrder {
  SORT_ORDER_UNSPECIFIED = 0;
  SORT_ORDER_ASC = 1;
  SORT_ORDER_DESC = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message GetProductRequest {
  string product_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];
}

message CreateProductRequest {
  // Product name: 3-200 characters
  string name = 1 [(buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 200
  }];

  // Description: optional, max 5000 chars
  string description = 2 [(buffalo.validate.rules).string = {
    max_len: 5000
  }];

  // Price: must be positive
  double price = 3 [(buffalo.validate.rules).double = {
    gt: 0.0,
    lte: 1000000.0
  }];

  // Currency: ISO 4217
  string currency = 4 [(buffalo.validate.rules).string = {
    len: 3,
    pattern: "^[A-Z]{3}$"
  }];

  // Category
  string category = 5 [(buffalo.validate.rules).string = {
    min_len: 1,
    max_len: 100
  }];

  // Stock: non-negative
  int32 stock_quantity = 6 [(buffalo.validate.rules).int32 = {
    gte: 0
  }];

  // Images: 1-10 URLs
  repeated string image_urls = 7 [(buffalo.validate.rules).repeated = {
    min_items: 1,
    max_items: 10
  }];

  // Tags: up to 20
  repeated string tags = 8 [(buffalo.validate.rules).repeated = {
    max_items: 20,
    unique: true
  }];

  // SKU: unique identifier
  string sku = 9 [(buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 50,
    pattern: "^[A-Z0-9-]+$"
  }];

  // Weight in grams (optional)
  int32 weight_grams = 10 [(buffalo.validate.rules).int32 = {
    gte: 0,
    lte: 100000
  }];

  // Dimensions
  Dimensions dimensions = 11;

  // Seller ID (set by system)
  string seller_id = 12 [(buffalo.validate.rules).string = {
    uuid: true
  }];
}

message Dimensions {
  double length_cm = 1 [(buffalo.validate.rules).double = {
    gt: 0.0,
    lte: 500.0
  }];

  double width_cm = 2 [(buffalo.validate.rules).double = {
    gt: 0.0,
    lte: 500.0
  }];

  double height_cm = 3 [(buffalo.validate.rules).double = {
    gt: 0.0,
    lte: 500.0
  }];
}

message Product {
  string product_id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string currency = 5;
  string category = 6;
  int32 stock_quantity = 7;
  repeated string image_urls = 8;
  repeated string tags = 9;
  string sku = 10;
  int32 weight_grams = 11;
  Dimensions dimensions = 12;
  string seller_id = 13;
  double rating = 14;
  int32 review_count = 15;
  int64 created_at = 16;
  int64 updated_at = 17;
}

message UpdateProductRequest {
  string product_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  string seller_id = 2 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  // Optional fields for update
  optional string name = 3 [(buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 200
  }];

  optional string description = 4 [(buffalo.validate.rules).string = {
    max_len: 5000
  }];

  optional double price = 5 [(buffalo.validate.rules).double = {
    gt: 0.0
  }];

  optional int32 stock_quantity = 6 [(buffalo.validate.rules).int32 = {
    gte: 0
  }];
}

message DeleteProductRequest {
  string product_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];
}

message DeleteProductResponse {
  bool success = 1;
}

// ============================================================================
// Order Messages
// ============================================================================

message CreateOrderRequest {
  // Customer ID (from auth context)
  string customer_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  // Order items: at least 1
  repeated OrderItem items = 2 [(buffalo.validate.rules).repeated = {
    min_items: 1,
    max_items: 50
  }];

  // Shipping address
  Address shipping_address = 3;

  // Billing address (optional, defaults to shipping)
  Address billing_address = 4;

  // Payment method
  PaymentMethod payment_method = 5;

  // Promo code (optional)
  string promo_code = 6 [(buffalo.validate.rules).string = {
    max_len: 50,
    pattern: "^[A-Z0-9-]*$"
  }];

  // Order notes
  string notes = 7 [(buffalo.validate.rules).string = {
    max_len: 1000
  }];
}

message OrderItem {
  string product_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  int32 quantity = 2 [(buffalo.validate.rules).int32 = {
    gte: 1,
    lte: 99
  }];
}

message Address {
  string full_name = 1 [(buffalo.validate.rules).string = {
    min_len: 2,
    max_len: 100
  }];

  string street_line1 = 2 [(buffalo.validate.rules).string = {
    min_len: 5,
    max_len: 200
  }];

  string street_line2 = 3 [(buffalo.validate.rules).string = {
    max_len: 200
  }];

  string city = 4 [(buffalo.validate.rules).string = {
    min_len: 2,
    max_len: 100
  }];

  string state = 5 [(buffalo.validate.rules).string = {
    max_len: 100
  }];

  string postal_code = 6 [(buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 20
  }];

  // ISO 3166-1 alpha-2
  string country_code = 7 [(buffalo.validate.rules).string = {
    len: 2,
    pattern: "^[A-Z]{2}$"
  }];

  string phone = 8 [(buffalo.validate.rules).string = {
    pattern: "^\\+?[1-9]\\d{1,14}$"
  }];
}

message PaymentMethod {
  oneof method {
    CreditCardPayment credit_card = 1;
    PayPalPayment paypal = 2;
    BankTransferPayment bank_transfer = 3;
  }
}

message CreditCardPayment {
  string card_token = 1 [(buffalo.validate.rules).string = {
    min_len: 10,
    max_len: 100
  }];
}

message PayPalPayment {
  string email = 1 [(buffalo.validate.rules).string = {
    email: true
  }];
}

message BankTransferPayment {
  string iban = 1 [(buffalo.validate.rules).string = {
    min_len: 15,
    max_len: 34
  }];
}

message Order {
  string order_id = 1;
  string customer_id = 2;
  repeated OrderLineItem line_items = 3;
  Address shipping_address = 4;
  Address billing_address = 5;
  double subtotal = 6;
  double discount = 7;
  double tax = 8;
  double shipping_cost = 9;
  double total = 10;
  string currency = 11;
  OrderStatus status = 12;
  string payment_status = 13;
  int64 created_at = 14;
  int64 updated_at = 15;
}

message OrderLineItem {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  double unit_price = 4;
  double total_price = 5;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_CONFIRMED = 2;
  ORDER_STATUS_PROCESSING = 3;
  ORDER_STATUS_SHIPPED = 4;
  ORDER_STATUS_DELIVERED = 5;
  ORDER_STATUS_CANCELLED = 6;
  ORDER_STATUS_REFUNDED = 7;
}

message GetOrderRequest {
  string order_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];
  
  string customer_id = 2 [(buffalo.validate.rules).string = {
    uuid: true
  }];
}

message CancelOrderRequest {
  string order_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  string customer_id = 2 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  string reason = 3 [(buffalo.validate.rules).string = {
    min_len: 10,
    max_len: 500
  }];
}

message CancelOrderResponse {
  bool success = 1;
  string refund_id = 2;
}

message RefundOrderRequest {
  string order_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  double amount = 2 [(buffalo.validate.rules).double = {
    gt: 0.0
  }];

  string reason = 3 [(buffalo.validate.rules).string = {
    min_len: 10,
    max_len: 500
  }];

  bool full_refund = 4;
}

message RefundOrderResponse {
  bool success = 1;
  string refund_id = 2;
  double refunded_amount = 3;
}
