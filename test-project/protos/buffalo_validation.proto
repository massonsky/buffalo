syntax = "proto3";

package buffalo.test.validation;

option go_package = "github.com/massonsky/buffalo/test-project/gen/validation";

// Import Buffalo validation rules
import "buffalo/validate/validate.proto";

// Test message with various Buffalo validation rules
message CreateUserRequest {
  // Required string with length constraints
  string username = 1 [(buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 50,
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  // Email validation
  string email = 2 [(buffalo.validate.rules).string = {
    email: true,
    max_len: 255
  }];

  // Password with minimum length
  string password = 3 [(buffalo.validate.rules).string = {
    min_len: 8,
    max_len: 128
  }];

  // Age with range validation
  int32 age = 4 [(buffalo.validate.rules).int32 = {
    gte: 0,
    lte: 150
  }];

  // UUID validation
  string user_id = 5 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  // Phone number pattern
  string phone = 6 [(buffalo.validate.rules).string = {
    pattern: "^\\+?[1-9]\\d{1,14}$"
  }];

  // URL validation
  string website = 7 [(buffalo.validate.rules).string = {
    uri: true
  }];

  // Hostname validation
  string hostname = 8 [(buffalo.validate.rules).string = {
    hostname: true
  }];

  // IP address validation
  string ip_address = 9 [(buffalo.validate.rules).string = {
    ip: true
  }];
}

// Message with numeric validations
message OrderRequest {
  // Positive quantity
  int32 quantity = 1 [(buffalo.validate.rules).int32 = {
    gt: 0,
    lte: 1000
  }];

  // Price must be positive
  double price = 2 [(buffalo.validate.rules).double = {
    gt: 0.0
  }];

  // Discount percentage
  float discount = 3 [(buffalo.validate.rules).float = {
    gte: 0.0,
    lte: 100.0
  }];

  // Order ID must be positive
  int64 order_id = 4 [(buffalo.validate.rules).int64 = {
    gt: 0
  }];

  // Unsigned value
  uint32 item_count = 5 [(buffalo.validate.rules).uint32 = {
    gte: 1
  }];
}

// Message with collection validations
message BatchRequest {
  // Array with size constraints
  repeated string items = 1 [(buffalo.validate.rules).repeated = {
    min_items: 1,
    max_items: 100,
    unique: true
  }];

  // Map with size constraints
  map<string, string> metadata = 2 [(buffalo.validate.rules).map = {
    min_pairs: 0,
    max_pairs: 50
  }];
}

// Message with bytes validation
message FileUploadRequest {
  string filename = 1 [(buffalo.validate.rules).string = {
    min_len: 1,
    max_len: 255
  }];

  bytes content = 2 [(buffalo.validate.rules).bytes = {
    min_len: 1,
    max_len: 10485760  // 10MB
  }];

  string content_type = 3 [(buffalo.validate.rules).string = {
    in: ["image/jpeg", "image/png", "application/pdf"]
  }];
}

// Enum with validation
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_PENDING = 1;
  STATUS_ACTIVE = 2;
  STATUS_COMPLETED = 3;
  STATUS_CANCELLED = 4;
}

message StatusUpdateRequest {
  string id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  Status status = 2 [(buffalo.validate.rules).enum = {
    defined_only: true,
    not_in: [0]  // Exclude UNSPECIFIED
  }];
}

// Timestamp validation
message EventRequest {
  string event_id = 1;
  
  // Timestamp validations would go here
  // google.protobuf.Timestamp scheduled_at = 2 [(buffalo.validate.rules).timestamp = {
  //   gt_now: true
  // }];
}

// Message with conditional validation (oneof)
message PaymentRequest {
  string payment_id = 1 [(buffalo.validate.rules).string = {
    uuid: true
  }];

  oneof payment_method {
    CreditCard credit_card = 2;
    BankTransfer bank_transfer = 3;
    Wallet wallet = 4;
  }
}

message CreditCard {
  string card_number = 1 [(buffalo.validate.rules).string = {
    len: 16,
    pattern: "^[0-9]+$"
  }];

  string cvv = 2 [(buffalo.validate.rules).string = {
    len: 3,
    pattern: "^[0-9]+$"
  }];

  int32 expiry_month = 3 [(buffalo.validate.rules).int32 = {
    gte: 1,
    lte: 12
  }];

  int32 expiry_year = 4 [(buffalo.validate.rules).int32 = {
    gte: 2024,
    lte: 2050
  }];
}

message BankTransfer {
  string iban = 1 [(buffalo.validate.rules).string = {
    min_len: 15,
    max_len: 34,
    pattern: "^[A-Z]{2}[0-9]{2}[A-Z0-9]+$"
  }];

  string bic = 2 [(buffalo.validate.rules).string = {
    pattern: "^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$"
  }];
}

message Wallet {
  string wallet_address = 1 [(buffalo.validate.rules).string = {
    min_len: 26,
    max_len: 62
  }];

  string wallet_type = 2 [(buffalo.validate.rules).string = {
    in: ["bitcoin", "ethereum", "litecoin"]
  }];
}
