syntax = "proto3";

package ecommerce.models;

option go_package = "github.com/yourorg/models-test/gen/ecommerce";

import "buffalo/models/models.proto";
import "buffalo/validate/validate.proto";

// ============================================================================
// User — основная модель пользователя
// ============================================================================
message User {
  option (buffalo.models.model) = {
    name: "User"
    table_name: "users"
    schema: "public"
    description: "Registered platform user"
    timestamps: true
    soft_delete: true
    generate: ["model"]
    tags: ["core", "auth"]
  };

  string id = 1 [(buffalo.models.field) = {
    primary_key: true
    auto_generate: true
    description: "UUID primary key"
  }];

  string email = 2 [(buffalo.models.field) = {
    unique: true
    max_length: 255
    example: "user@example.com"
    visibility: PUBLIC
    index: true
    index_type: BTREE
  }, (buffalo.validate.rules).string = {
    email: true,
    max_len: 255
  }];

  string username = 3 [(buffalo.models.field) = {
    unique: true
    max_length: 50
    min_length: 3
    visibility: PUBLIC
    index: true
  }, (buffalo.validate.rules).string = {
    min_len: 3,
    max_len: 50,
    pattern: "^[a-zA-Z0-9_]+$"
  }];

  string password_hash = 4 [(buffalo.models.field) = {
    behavior: WRITEONLY
    sensitive: true
    visibility: PRIVATE
    max_length: 256
  }];

  string display_name = 5 [(buffalo.models.field) = {
    max_length: 100
    nullable: true
    visibility: PUBLIC
    json_name: "displayName"
  }];

  int32 age = 6 [(buffalo.models.field) = {
    nullable: true
    comment: "User age in years"
  }, (buffalo.validate.rules).int32 = {
    gte: 0,
    lte: 150
  }];

  string role = 7 [(buffalo.models.field) = {
    default_value: "user"
    max_length: 20
    visibility: INTERNAL
  }];

  bool is_active = 8 [(buffalo.models.field) = {
    default_value: "true"
    index: true
  }];

  string avatar_url = 9 [(buffalo.models.field) = {
    nullable: true
    max_length: 512
    visibility: EXTERNAL
    omit_empty: true
  }];

  repeated string tags = 10 [(buffalo.models.field) = {
    description: "User tags for categorization"
  }];

  double reputation_score = 11 [(buffalo.models.field) = {
    behavior: COMPUTED
    db_ignore: true
    description: "Computed reputation score"
  }];

  string phone = 12 [(buffalo.models.field) = {
    nullable: true
    max_length: 20
    sensitive: true
    visibility: PROTECTED
  }, (buffalo.validate.rules).string = {
    pattern: "^\\+?[1-9]\\d{1,14}$"
  }];
}

// ============================================================================
// Product — товар
// ============================================================================
message Product {
  option (buffalo.models.model) = {
    name: "Product"
    table_name: "products"
    description: "Catalog product"
    timestamps: true
    generate: ["model"]
    tags: ["catalog"]
  };

  string id = 1 [(buffalo.models.field) = {
    primary_key: true
    auto_generate: true
  }];

  string name = 2 [(buffalo.models.field) = {
    max_length: 200
    visibility: PUBLIC
    index: true
  }, (buffalo.validate.rules).string = {
    min_len: 1,
    max_len: 200
  }];

  string sku = 3 [(buffalo.models.field) = {
    unique: true
    max_length: 50
    alias: "product_sku"
    description: "Stock Keeping Unit"
  }];

  double price = 4 [(buffalo.models.field) = {
    description: "Price in base currency"
    comment: "Stored as cents"
  }, (buffalo.validate.rules).double = {
    gt: 0.0
  }];

  int32 stock_quantity = 5 [(buffalo.models.field) = {
    default_value: "0"
    comment: "Available inventory count"
  }, (buffalo.validate.rules).int32 = {
    gte: 0
  }];

  string category = 6 [(buffalo.models.field) = {
    max_length: 100
    nullable: true
    index: true
  }];

  string description = 7 [(buffalo.models.field) = {
    nullable: true
    max_length: 5000
    visibility: PUBLIC
  }];

  bool is_published = 8 [(buffalo.models.field) = {
    default_value: "false"
    index: true
  }];

  float weight_kg = 9 [(buffalo.models.field) = {
    nullable: true
    comment: "Product weight in kilograms"
  }];

  repeated string image_urls = 10 [(buffalo.models.field) = {
    description: "Product image URLs"
    visibility: EXTERNAL
  }];
}

// ============================================================================
// Order — заказ
// ============================================================================
message Order {
  option (buffalo.models.model) = {
    name: "Order"
    table_name: "orders"
    description: "Customer order"
    timestamps: true
    soft_delete: true
    generate: ["model"]
    tags: ["commerce", "billing"]
  };

  string id = 1 [(buffalo.models.field) = {
    primary_key: true
    auto_generate: true
  }];

  string user_id = 2 [(buffalo.models.field) = {
    index: true
    description: "Reference to User"
  }];

  string status = 3 [(buffalo.models.field) = {
    default_value: "pending"
    max_length: 30
    index: true
  }];

  double total_amount = 4 [(buffalo.models.field) = {
    description: "Total order amount"
  }, (buffalo.validate.rules).double = {
    gt: 0.0
  }];

  string currency = 5 [(buffalo.models.field) = {
    default_value: "USD"
    max_length: 3
  }];

  string shipping_address = 6 [(buffalo.models.field) = {
    max_length: 500
    nullable: true
  }];

  string tracking_number = 7 [(buffalo.models.field) = {
    nullable: true
    max_length: 100
    behavior: READONLY
    description: "Set by logistics system"
  }];

  int32 item_count = 8 [(buffalo.models.field) = {
    behavior: COMPUTED
    db_ignore: true
    description: "Computed item count"
  }];

  string notes = 9 [(buffalo.models.field) = {
    nullable: true
    max_length: 1000
    visibility: INTERNAL
  }];
}

// ============================================================================
// AuditLog — не модель (нет аннотации, пропускается)
// ============================================================================
message AuditLog {
  string id = 1;
  string action = 2;
  string entity_type = 3;
  string entity_id = 4;
  string user_id = 5;
  int64 timestamp = 6;
}
