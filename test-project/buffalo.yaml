project:
    name: my-proto-project
    version: 0.1.0
proto:
    paths:
        - ./protos
    exclude:
        - '**/*_test.proto'
    import_paths: []
output:
    base_dir: "./generated"
    directories:
        cpp: cpp
        go: go
        python: python
        rust: rust
    preserve_proto_structure: true
languages:
    python:
        enabled: false
        package: proto_gen
        generator: grpcio-tools
        workdir: ""
    go:
        enabled: true
        module: github.com/yourorg/yourproject
        generator: protoc-gen-go
    rust:
        enabled: true
        generator: rust-protobuf
    cpp:
        enabled: false
        namespace: myproject
build:
    workers: 0
    incremental: true
    cache:
        enabled: true
        directory: .buffalo-cache
versioning:
    enabled: true
    strategy: semantic
    outputformat: ""
    keepversions: 0
logging:
    level: info
    format: colored
    output: stdout
    file: buffalo.log
dependencies:
    - name: googleapis
      source:
        type: git
        url: https://github.com/googleapis/googleapis
        ref: master
      version: master
plugins:
    - name: naming-validator
      enabled: false
      hookpoints:
        - pre-build
        - post-parse
        - post-build
      priority: 100
      options: {}
templates:
    - name: custom-go
      language: go
      path: ./templates/go
      patterns:
        - "**/*.tmpl"
      enabled: true
      vars:
        packagePrefix: github.com/yourorg
    - name: custom-python
      language: python
      path: ./templates/python
      patterns:
        - "**/*.tmpl"
      enabled: true
      vars:
        modulePrefix: proto_gen
    - name: custom-rust
      language: rust
      path: ./templates/rust
      patterns:
        - "**/*.tmpl"
      enabled: true
      vars:
        cratePrefix: proto_rust
