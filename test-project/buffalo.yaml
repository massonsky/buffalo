project:
    name: my-proto-project
    version: 0.1.0
proto:
    paths:
        - ./protos
    exclude:
        - '**/*_test.proto'
    importpaths: []
output:
    basedir: ""
    directories:
        cpp: cpp
        go: go
        python: python
        rust: rust
    preserveprotostructure: false
languages:
    python:
        enabled: true
        package: proto_gen
        generator: grpcio-tools
    go:
        enabled: true
        module: github.com/yourorg/yourproject
        generator: protoc-gen-go
    rust:
        enabled: false
        generator: prost
    cpp:
        enabled: false
        namespace: myproject
build:
    workers: 0
    incremental: true
    cache:
        enabled: true
        directory: .buffalo-cache
versioning:
    enabled: true
    strategy: semantic
    outputformat: ""
    keepversions: 0
logging:
    level: info
    format: colored
    output: stdout
    file: buffalo.log
dependencies:
    - name: googleapis
      source:
        type: git
        url: https://github.com/googleapis/googleapis
        ref: master
      version: master
plugins:
    - name: naming-validator
      enabled: false
      hookpoints:
        - pre-build
        - post-parse
        - post-build
      priority: 100
      options: {}
