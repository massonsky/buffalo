project:
    name: models-e2e-test
    version: 1.0.0
proto:
    paths:
        - ./protos
    exclude: []
    import_paths: []
output:
    base_dir: "./generated"
    directories:
        cpp: cpp
        go: go
        python: python
        rust: rust
    preserve_proto_structure: false
languages:
    python:
        enabled: true
        package: proto_gen
        generator: grpcio-tools
        orm: true
        orm_plugin: "pydantic@2.0"
        models_output: generated/models/python
    go:
        enabled: true
        module: github.com/yourorg/models-test
        generator: protoc-gen-go
        orm: true
        orm_plugin: "gorm"
        models_output: generated/models/go
    rust:
        enabled: true
        generator: rust-protobuf
        orm: true
        orm_plugin: "diesel@2.1"
        models_output: generated/models/rust
    cpp:
        enabled: true
        namespace: models_test
        orm: true
        orm_plugin: "None"
        models_output: generated/models/cpp
build:
    workers: 0
    incremental: true
    cache:
        enabled: false
versioning:
    enabled: false
logging:
    level: debug
    format: colored
    output: stdout
models:
    enabled: true
