# Build Verification — quick build check for PRs
# Full CI pipeline (lint + test + build + promote) is in ci.yml

name: Build Check

on:
  pull_request:
    branches: [dev, devb, main]

env:
  GO_VERSION: "1.24"

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: |
          MODULE="github.com/massonsky/buffalo/internal/version"
          LDFLAGS="-X ${MODULE}.Version=pr-check -s -w"
          go build -ldflags "${LDFLAGS}" -o buffalo ./cmd/buffalo

      - name: Verify
        run: |
          chmod +x buffalo
          ./buffalo version
