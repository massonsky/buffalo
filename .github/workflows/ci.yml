# CI Pipeline: dev push → lint + test + build → merge to main → tag
#
# Flow:
#   1. Push to dev/devb triggers lint, test (3 OS), build (5 platforms)
#   2. If all green → auto-merge to main → create tag v1.30.<hash>
#   3. Tag push triggers release.yml → GitHub Release with binaries

name: CI

on:
  push:
    branches: [dev, devb]
  pull_request:
    branches: [dev, devb, main]

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  VERSION_PREFIX: "1.30"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        shell: bash
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${{ env.VERSION_PREFIX }}.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          MODULE="github.com/massonsky/buffalo/internal/version"
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-X ${MODULE}.Version=${VERSION} -X ${MODULE}.BuildDate=${BUILD_TIME} -X ${MODULE}.GitCommit=${SHORT_SHA} -s -w"

          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-linux-amd64       ./cmd/buffalo
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-linux-arm64       ./cmd/buffalo
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-darwin-amd64      ./cmd/buffalo
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-darwin-arm64      ./cmd/buffalo
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-windows-amd64.exe ./cmd/buffalo

      - name: Verify binary
        run: |
          chmod +x dist/buffalo-linux-amd64
          dist/buffalo-linux-amd64 version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: buffalo-binaries
          path: dist/
          retention-days: 30

  promote:
    name: Promote to main
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${{ env.VERSION_PREFIX }}.${SHORT_SHA}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge to main
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main || true
          git checkout main 2>/dev/null || git checkout -b main
          git merge --ff-only ${{ github.sha }} \
            -m "ci: merge ${{ github.ref_name }} → main (${{ steps.version.outputs.version }})"
          git push origin main

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "${TAG}" -m "release: ${TAG}"
          git push origin "${TAG}"
