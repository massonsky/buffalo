# Release Pipeline: tag push → build binaries → GitHub Release
#
# Triggered automatically by ci.yml promote job when a tag v* is pushed.
# Builds cross-platform binaries with version from tag, creates GitHub Release.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Release: ${TAG} (version: ${VERSION})"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          MODULE="github.com/massonsky/buffalo/internal/version"
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-X ${MODULE}.Version=${VERSION} -X ${MODULE}.BuildDate=${BUILD_TIME} -X ${MODULE}.GitCommit=${SHORT_SHA} -s -w"

          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-linux-amd64       ./cmd/buffalo
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-linux-arm64       ./cmd/buffalo
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-darwin-amd64      ./cmd/buffalo
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-darwin-arm64      ./cmd/buffalo
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/buffalo-windows-amd64.exe ./cmd/buffalo

      - name: Verify binary
        run: |
          chmod +x dist/buffalo-linux-amd64
          dist/buffalo-linux-amd64 version

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Buffalo ${{ steps.version.outputs.version }}
          body: |
            ## Buffalo ${{ steps.version.outputs.version }}

            ### Installation
            ```bash
            # Linux (amd64)
            curl -L -o buffalo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/buffalo-linux-amd64
            chmod +x buffalo && sudo mv buffalo /usr/local/bin/

            # macOS (Apple Silicon)
            curl -L -o buffalo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/buffalo-darwin-arm64
            chmod +x buffalo && sudo mv buffalo /usr/local/bin/
            ```

            ### Binaries
            | Platform | File |
            |----------|------|
            | Linux amd64 | `buffalo-linux-amd64` |
            | Linux arm64 | `buffalo-linux-arm64` |
            | macOS amd64 | `buffalo-darwin-amd64` |
            | macOS arm64 | `buffalo-darwin-arm64` |
            | Windows amd64 | `buffalo-windows-amd64.exe` |
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
